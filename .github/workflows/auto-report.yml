name: 🏆 世界杯自动分析报告生成

on:
  # 北京时间 12:00 = UTC 04:00
  schedule:
    - cron: '0 4 * * *'
  
  # 允许手动触发，支持指定日期
  workflow_dispatch:
    inputs:
      target_date:
        description: '目标日期 (YYYY-MM-DD)，不填则默认后天北京时间'
        required: false
        default: ''

jobs:
  generate-report:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write  # 允许推送到仓库
    
    steps:
      - name: 📥 Checkout 仓库
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🐍 设置 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: 📦 安装依赖
        run: |
          pip install requests python-dateutil pytz
      
      - name: 📅 确定目标日期（北京时间后天）
        run: |
          if [ -n "${{ github.event.inputs.target_date }}" ]; then
            echo "TARGET_DATE=${{ github.event.inputs.target_date }}" >> $GITHUB_ENV
          else
            TARGET=$(TZ='Asia/Shanghai' date -d '+2 days' '+%Y-%m-%d')
            echo "TARGET_DATE=$TARGET" >> $GITHUB_ENV
          fi
      
      - name: 🔍 采集API数据 + 生成HTML报告
        env:
          APIFOOTBALL_KEY: ${{ secrets.APIFOOTBALL_KEY }}
          ODDS_KEY: ${{ secrets.ODDS_KEY }}
          TAVILY_KEY: ${{ secrets.TAVILY_KEY }}
          # 仓库根目录（脚本会输出到 分析/ 目录）
          REPORT_OUTPUT_DIR: ${{ github.workspace }}/分析
        run: |
          cd scripts
          python auto_generate_report.py $TARGET_DATE
          echo "=== 采集和生成完成 ==="
      
      - name: 📋 更新 index.html（插入新报告链接）
        run: |
          python scripts/update_index.py $TARGET_DATE || echo "index.html 更新跳过（无比赛）"
      
      - name: 🔧 配置 Git
        run: |
          git config user.name "World Cup Bot 🤖"
          git config user.email "bot@worldcup.imiaozhan.com"
      
      - name: 📤 提交并推送到 GitHub Pages
        run: |
          git add 分析/ index.html 2>/dev/null || true
          # 检查是否有变更
          if git diff --cached --quiet; then
            echo "⚠️ 无变更，可能当天无世界杯比赛"
          else
            git commit -m "🤖 v29.0 自动生成 $TARGET_DATE 量化分析报告 [skip ci]"
            git push
            echo "✅ 报告已推送: $TARGET_DATE"
          fi
      
      - name: 📊 完成统计
        run: |
          echo "============================================"
          echo "✅ 自动报告生成流程完成"
          echo "目标日期: $TARGET_DATE"
          echo "在线地址: https://worldcup.imiaozhan.com"
          ls -la 分析/ | grep $TARGET_DATE || echo "（当天无比赛，跳过）"
          echo "============================================"
