name: 🏆 世界杯数据采集 (阶段1: 一至四)

on:
  # 北京时间 12:00 = UTC 04:00
  schedule:
    - cron: '0 4 * * *'
  
  # 允许手动触发，支持指定日期
  workflow_dispatch:
    inputs:
      target_date:
        description: '目标日期 (YYYY-MM-DD)，不填则默认后天北京时间'
        required: false
        default: ''

jobs:
  collect-data:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
    
    steps:
      - name: 📥 Checkout 仓库
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🐍 设置 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: 📦 安装依赖
        run: |
          pip install requests python-dateutil pytz
      
      - name: 📅 确定目标日期（北京时间后天）
        run: |
          if [ -n "${{ github.event.inputs.target_date }}" ]; then
            echo "TARGET_DATE=${{ github.event.inputs.target_date }}" >> $GITHUB_ENV
          else
            TARGET=$(TZ='Asia/Shanghai' date -d '+2 days' '+%Y-%m-%d')
            echo "TARGET_DATE=$TARGET" >> $GITHUB_ENV
          fi
      
      - name: 🔍 采集数据（一至四：基础实力+状态+战术+赔率）
        env:
          APIFOOTBALL_KEY: ${{ secrets.APIFOOTBALL_KEY }}
          ODDS_KEY: ${{ secrets.ODDS_KEY }}
          ODDSPAPI_KEY: ${{ secrets.ODDSPAPI_KEY }}
          TAVILY_KEY: ${{ secrets.TAVILY_KEY }}
          # JSON数据输出到 data/ 目录
          DATA_OUTPUT_DIR: ${{ github.workspace }}/data
        run: |
          cd scripts
          python collect_data.py $TARGET_DATE --output-dir $DATA_OUTPUT_DIR
          echo "=== 数据采集完成 ==="
      
      - name: 🔧 配置 Git
        run: |
          git config user.name "World Cup Bot 🤖"
          git config user.email "bot@worldcup.imiaozhan.com"
      
      - name: 📤 提交并推送JSON数据
        run: |
          git add data/*.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "⚠️ 无数据变更，可能当天无世界杯比赛或数据未更新"
          else
            git commit -m "📊 v30.0 数据采集 $TARGET_DATE (一至四) [skip ci]"
            git push
            echo "✅ JSON数据已推送: data/$TARGET_DATE.json"
          fi
      
      - name: 📊 完成统计
        run: |
          echo "============================================"
          echo "✅ 阶段1数据采集完成"
          echo "目标日期: $TARGET_DATE"
          echo "输出文件: data/$TARGET_DATE.json"
          ls -la data/ | grep "$TARGET_DATE" || echo "（当天无比赛）"
          echo ""
          echo "📍 下一步: 本地运行 generate_full_report.py"
          echo "   命令: python generate_full_report.py $TARGET_DATE"
          echo "============================================"
