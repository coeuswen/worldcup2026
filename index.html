<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>世界杯2026 赛果预测 - 访问验证</title>
<style>
:root {
  --bg: #0f0f0f;
  --card-bg: #1a1a1a;
  --text: #e0e0e0;
  --accent: #f5a623;
  --accent2: #d32f2f;
  --muted: #888;
  --border: #2a2a2a;
  --green: #4caf50;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  line-height: 1.6;
}
.container {
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 40px 32px;
  max-width: 400px;
  width: 90%;
  text-align: center;
}
.emoji { font-size: 3em; margin-bottom: 16px; }
h1 { color: var(--accent); font-size: 1.4em; margin-bottom: 8px; }
.subtitle { color: var(--muted); font-size: 0.9em; margin-bottom: 28px; }
label { display: block; color: var(--muted); font-size: 0.85em; margin-bottom: 6px; text-align: left; }
input[type="password"] {
  width: 100%;
  padding: 12px 16px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--bg);
  color: var(--text);
  font-size: 1.1em;
  text-align: center;
  letter-spacing: 4px;
  outline: none;
  transition: border-color 0.2s;
}
input[type="password"]:focus {
  border-color: var(--accent);
}
.btn {
  width: 100%;
  padding: 12px;
  border-radius: 8px;
  border: none;
  background: var(--accent);
  color: #000;
  font-size: 1em;
  font-weight: bold;
  cursor: pointer;
  margin-top: 16px;
  transition: opacity 0.2s;
}
.btn:hover { opacity: 0.85; }
.error { color: var(--accent2); font-size: 0.85em; margin-top: 12px; min-height: 1.2em; }
.hint { color: var(--muted); font-size: 0.78em; margin-top: 16px; opacity: 0.6; }
@keyframes shake { 0%,100%{transform:translateX(0)} 20%,60%{transform:translateX(-6px)} 40%,80%{transform:translateX(6px)} }
.shake { animation: shake 0.4s; }
</style>
</head>
<body>

<div class="container" id="box">
  <div class="emoji">🔒</div>
  <h1>世界杯2026 赛果预测</h1>
  <p class="subtitle">请输入访问密码以查看分析报告</p>
  <label for="pwd">访问密码</label>
  <input type="password" id="pwd" maxlength="20" autofocus placeholder="•••" />
  <button class="btn" onclick="checkPwd()">进入</button>
  <div class="error" id="err"></div>
  <div class="hint">本站点内容为量化分析预测，仅供学习交流</div>
</div>

<script>
const CORRECT = "987";

function checkPwd() {
  var inp = document.getElementById("pwd");
  var val = inp.value.trim();
  var err = document.getElementById("err");
  var box = document.getElementById("box");

  if (val === CORRECT) {
    err.textContent = "";
    localStorage.setItem("auth", "1");
    document.body.style.opacity = "0.5";
    setTimeout(function() {
      window.location.href = "home.html";
    }, 300);
  } else {
    err.textContent = "密码错误，请重试";
    box.classList.remove("shake");
    void box.offsetWidth; // reflow
    box.classList.add("shake");
    inp.value = "";
    inp.focus();
  }
}

// Enter key
document.getElementById("pwd").addEventListener("keydown", function(e) {
  if (e.key === "Enter") checkPwd();
});

// Auto-redirect if already authed
if (localStorage.getItem("auth") === "1") {
  window.location.href = "home.html";
}
</script>
</body>
</html>
