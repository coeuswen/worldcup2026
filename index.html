<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>世界杯2026 赛果预测</title>
<style>
:root {
  --bg: #0f0f0f;
  --card-bg: #1a1a1a;
  --text: #e0e0e0;
  --accent: #f5a623;
  --accent2: #d32f2f;
  --green: #4caf50;
  --muted: #888;
  --border: #2a2a2a;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  line-height: 1.6;
}
.header {
  text-align: center;
  padding: 48px 20px 32px;
  background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
  border-bottom: 3px solid var(--accent);
}
.header h1 {
  font-size: 2.2em;
  color: #fff;
  margin-bottom: 8px;
}
.header .subtitle {
  color: var(--accent);
  font-size: 1.1em;
  opacity: 0.9;
}
.header .emoji { font-size: 1.4em; }
.container {
  max-width: 800px;
  margin: 0 auto;
  padding: 24px 16px;
}
.stats-bar {
  display: flex;
  justify-content: center;
  gap: 32px;
  margin: 20px 0 32px;
  flex-wrap: wrap;
}
.stat {
  text-align: center;
  background: var(--card-bg);
  padding: 16px 28px;
  border-radius: 12px;
  border: 1px solid var(--border);
}
.stat .num {
  font-size: 2em;
  font-weight: bold;
  color: var(--accent);
}
.stat .label { color: var(--muted); font-size: 0.85em; margin-top: 4px; }
.report-card {
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 20px;
  margin-bottom: 16px;
  transition: transform 0.2s, border-color 0.2s;
  cursor: pointer;
  display: block;
  text-decoration: none;
  color: var(--text);
}
.report-card:hover {
  transform: translateY(-2px);
  border-color: var(--accent);
}
.report-card .date {
  font-size: 1.2em;
  font-weight: bold;
  color: var(--accent);
}
.report-card .title {
  font-size: 1em;
  margin-top: 6px;
  color: #ccc;
}
.report-card .arrow {
  float: right;
  color: var(--muted);
  font-size: 1.2em;
}
.report-card .matches {
  font-size: 0.85em;
  color: var(--muted);
  margin-top: 8px;
  padding-top: 8px;
  border-top: 1px solid var(--border);
}
.empty {
  text-align: center;
  color: var(--muted);
  padding: 60px 20px;
}
.footer {
  text-align: center;
  padding: 32px 20px;
  color: var(--muted);
  font-size: 0.85em;
  border-top: 1px solid var(--border);
  margin-top: 40px;
}
@keyframes pulse {
  0%,100% { opacity:1; }
  50% { opacity:0.5; }
}
.loading { animation: pulse 1.5s infinite; }
@media (max-width: 600px) {
  .header h1 { font-size: 1.6em; }
  .stats-bar { gap: 16px; }
  .stat { padding: 12px 20px; }
  .stat .num { font-size: 1.5em; }
}
</style>
</head>
<body>

<div class="header">
  <h1><span class="emoji">⚽</span> 世界杯2026 赛果预测</h1>
  <p class="subtitle">结合欧赔指数 · ELO评分 · AI预测模型</p>
</div>

<div class="container">
  <div class="stats-bar">
    <div class="stat"><div class="num" id="totalCount">—</div><div class="label">📊 已分析比赛日</div></div>
    <div class="stat"><div class="num" id="totalMatches">—</div><div class="label">🏟️ 预测场次</div></div>
    <div class="stat"><div class="num" id="latestDate">—</div><div class="label">📅 最新报告</div></div>
  </div>
  <h3 style="margin-bottom:16px;color:#ccc;">📋 预测报告列表</h3>
  <div id="reportList"><p class="empty loading">加载中...</p></div>
</div>

<div class="footer">
  <p>数据来源：zgzcw.com · ELO评级 · Polymarket | 仅供娱乐参考</p>
  <p style="margin-top:4px;">由 WorkBuddy AI 自动生成并发布</p>
</div>

<script>
// 报告列表 — 每次新增报告在此添加一行
const REPORTS = [
  { date:"6/15 投注 v14.1", file:"2026-06-15-投注建议.html", matches:"德国vs库拉索 | 荷兰vs日本 | 科特迪瓦vs厄瓜多尔 | 瑞典vs突尼斯", summary:"🆕v14.1 德国零封比分复选 · 大小球条件概率优化 · SPF×比分二串一(2元→25.4元) · 过2关三串三 · 6方案全回本" },
  { date:"6/14 投注 v14.0", file:"2026-06-14-投注建议.html", matches:"卡塔尔vs瑞士 | 巴西vs摩洛哥 | 海地vs苏格兰 | 澳大利亚vs土耳其", summary:"🆕v14.0 SPF+过N关 · 新增SPF胜负平分析+6方案 · 三串一过2关(容错)+过3关(全中)双模式 · SPF基底×比分加成最佳性价比 · 乱码修复" },
  { date:"6/12-13 投注", file:"2026-06-12-13-投注建议.html", matches:"墨西哥vs南非 | 韩国vs捷克 | 加拿大vs波黑 | 美国vs巴拉圭", summary:"🏆v9.0 复选比分+大小球联动 · 零封场次多比分覆盖(1:0+2:0+3:0) · 泊松交叉验证 · 四方案A~D层层递进 · 中最低必回本" },
  { date:"6/12 分析 v8", file:"2026-06-12-分析报告.html", matches:"墨西哥 vs 南非 | 韩国 vs 捷克", summary:"🆕v8.0 泊松比分深度分析 · xG进球期望+弱队进球+0:0研判+欧赔倒推 · 四大模块全覆盖 · 零封性价比判断" },
  { date:"6/15 分析 v8", file:"2026-06-15-分析报告.html", matches:"德国 vs 库拉索 | 荷兰 vs 日本 | 科特迪瓦 vs 厄瓜多尔 | 瑞典 vs 突尼斯", summary:"🆕v8.0 泊松分析 · 德国xG碾压局(λ4.0+) · 荷兰vs日本亚洲修正 · 科特迪瓦非洲-20分 · 瑞典北欧稳健 · 四大模块全" },
  { date:"6/14 分析 v8", file:"2026-06-14-分析报告.html", matches:"卡塔尔 vs 瑞士 | 巴西 vs 摩洛哥 | 海地 vs 苏格兰 | 澳大利亚 vs 土耳其", summary:"🆕v8.0 泊松分析 · 瑞士ELO+400碾压 · 巴西大热深盘检验 · 海地vs苏格兰低比分 · 澳大利亚主场劣势" },
  { date:"6/13 分析 v8", file:"2026-06-13-分析报告.html", matches:"加拿大 vs 波黑 | 美国 vs 巴拉圭", summary:"🆕v8.0 泊松分析 · 加拿大零封55%偏优 · 美国vs巴拉圭大球倾向69% · 0:0研判+弱队进球+欧赔倒推" },
  { date:"6/12 分析 v5", file:"2026-06-12-赛果预测报告.html", matches:"墨西哥 vs 南非 | 韩国 vs 捷克", summary:"欧亚联合v5.0 · 墨西哥深盘双保险 · 韩国vs捷克平手盘欧亚一致·任意方向可出" }
];

(function(){
  document.getElementById("totalCount").textContent = REPORTS.length;
  let totalM = 0;
  REPORTS.forEach(r => { totalM += (r.matches.match(/vs/g)||[]).length; });
  document.getElementById("totalMatches").textContent = totalM;
  if(REPORTS.length > 0) document.getElementById("latestDate").textContent = REPORTS[0].date;
  else document.getElementById("latestDate").textContent = "暂无";

  const list = document.getElementById("reportList");
  if(REPORTS.length === 0) {
    list.innerHTML = '<p class="empty">暂无预测报告</p>';
  } else {
    list.innerHTML = REPORTS.map(r => `
      <a class="report-card" href="${encodeURI(r.file)}">
        <span class="arrow">→</span>
        <div class="date">📅 ${r.date}</div>
        <div class="title">${r.summary}</div>
        <div class="matches">🏟️ ${r.matches}</div>
      </a>
    `).join("");
  }
})();
</script>
</body>
</html>
