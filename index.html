<style>
:root {
  --bg: #0f0f0f;
  --card-bg: #1a1a1a;
  --text: #e0e0e0;
  --accent: #f5a623;
  --accent2: #d32f2f;
  --green: #4caf50;
  --blue: #42a5f5;
  --pink: #e91e90;
  --muted: #888;
  --border: #2a2a2a;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  line-height: 1.6;
}
.header {
  text-align: center;
  padding: 48px 20px 32px;
  background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
  border-bottom: 3px solid var(--accent);
}
.header h1 { font-size: 2.2em; color: #fff; margin-bottom: 8px; }
.header .subtitle { color: var(--accent); font-size: 1.1em; opacity: 0.9; }
.header .emoji { font-size: 1.4em; }
.container { max-width: 800px; margin: 0 auto; padding: 24px 16px; }
.stats-bar {
  display: flex; justify-content: center; gap: 24px;
  margin: 20px 0 32px; flex-wrap: wrap;
}
.stat {
  text-align: center; background: var(--card-bg);
  padding: 14px 24px; border-radius: 12px; border: 1px solid var(--border);
}
.stat .num { font-size: 1.8em; font-weight: bold; color: var(--accent); }
.stat .label { color: var(--muted); font-size: 0.85em; margin-top: 4px; }

.section-header {
  display: flex; align-items: center; gap: 10px;
  margin: 28px 0 14px; padding-bottom: 8px;
  border-bottom: 1px solid var(--border);
}
.section-header .icon { font-size: 1.4em; }
.section-header h3 { color: #ccc; font-size: 1.1em; }
.section-header .count {
  color: var(--muted); font-size: 0.85em;
  margin-left: auto;
}

.report-card {
  background: var(--card-bg); border: 1px solid var(--border);
  border-radius: 12px; padding: 20px; margin-bottom: 14px;
  transition: transform 0.2s, border-color 0.2s;
  cursor: pointer; display: block; text-decoration: none; color: var(--text);
}
.report-card:hover { transform: translateY(-2px); border-color: var(--accent); }
.report-card.analysis:hover { border-color: var(--blue); }
.report-card.betting:hover { border-color: var(--pink); }
.report-card .date {
  font-size: 1.1em; font-weight: bold; color: var(--accent);
}
.report-card.analysis .date { color: var(--blue); }
.report-card.betting .date { color: var(--pink); }
.report-card .title { font-size: 0.95em; margin-top: 6px; color: #ccc; }
.report-card .arrow { float: right; color: var(--muted); font-size: 1.2em; }
.report-card .matches {
  font-size: 0.85em; color: var(--muted); margin-top: 8px;
  padding-top: 8px; border-top: 1px solid var(--border);
}
.report-card .tag {
  display: inline-block; font-size: 0.75em; padding: 2px 8px;
  border-radius: 4px; margin-right: 6px;
}
.tag-latest { background: #2e7d32; color: #a5d6a7; }
.tag-hist { background: #424242; color: #9e9e9e; }

.empty { text-align: center; color: var(--muted); padding: 60px 20px; }
.footer {
  text-align: center; padding: 32px 20px; color: var(--muted);
  font-size: 0.85em; border-top: 1px solid var(--border); margin-top: 40px;
}
@keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.5; } }
.loading { animation: pulse 1.5s infinite; }
@media (max-width: 600px) {
  .header h1 { font-size: 1.6em; }
  .stats-bar { gap: 12px; }
  .stat { padding: 10px 16px; }
  .stat .num { font-size: 1.4em; }
}
</style>

  var c = group === 'analysis' ? 'analysis' : 'betting';
  return '<a class="report-card ' + c + '" href="' + encodeURI(r.file) + '">' +
    '<span class="arrow">&#x2192;</span>' +
    '<div class="date">' + tagHtml + '&#x1F4C5; ' + r.date + '</div>' +
    '<div class="title">' + r.summary + '</div>' +
    '<div class="matches">&#x1F3DF; ' + r.matches + '</div>' +
    '</a>';
}
